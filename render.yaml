services:
  - type: web
    name: dip-simulator-unified
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Add database env vars here if needed
      # - key: MYSQL_HOST
      #   value: your-db-host
